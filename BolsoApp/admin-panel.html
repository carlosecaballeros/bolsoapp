<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador - BolsoApp</title>
    <link rel="stylesheet" href="stiles.css">
    <style>
        /* Estilos rápidos para el modal y la tabla */
        .modal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); 
            z-index: 1000; 
            overflow-y: auto;
        }
        .modal-content {
            background: white; 
            margin: 5% auto; 
            padding: 20px; 
            width: 95%; 
            max-width: 800px; 
            border-radius: 10px;
            font-family: Arial, sans-serif;
        }
        table {
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px;
        }
        th, td {
            padding: 12px; 
            border-bottom: 1px solid #ddd; 
            text-align: left;
        }
        th { background-color: #f8f9fa; }
        .btn-delete {
            background: #ff4d4d; 
            color: white; 
            border: none; 
            padding: 5px 10px; 
            border-radius: 4px; 
            cursor: pointer;
        }
        .btn-delete:hover { background: #cc0000; }
        .btn-main {
            background-color: #007bff; 
            color: white; 
            padding: 15px 25px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px;
            margin: 10px;
        }
    </style>
</head>
<body>

    <div style="text-align: center; padding: 50px;">
        <h1>Panel de Control BolsoApp</h1>
        
        <button class="btn-main" id="btnVerUsuarios">👥 Ver Usuarios Suscritos</button>
        <button class="btn-main" onclick="window.location.reload()" style="background-color: #28a745;">🔄 Actualizar Datos</button>
    </div>

    <div id="modalUsuarios" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px;">
                <h2 style="margin: 0;">Usuarios Registrados</h2>
                <button id="btnCerrarModal" style="background: #666; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Cerrar</button>
            </div>
            
            <div id="listaUsuariosContenedor">
                <p id="mensajeCarga" style="text-align: center; padding: 20px;">Cargando base de datos...</p>
                <table id="tablaUsuarios" style="display: none;">
                    <thead>
                        <tr>
                            <th>Nombre Completo</th>
                            <th>WhatsApp</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTablaUsuarios">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const btnVerUsuarios = document.getElementById('btnVerUsuarios');
        const modalUsuarios = document.getElementById('modalUsuarios');
        const btnCerrarModal = document.getElementById('btnCerrarModal');
        const cuerpoTabla = document.getElementById('cuerpoTablaUsuarios');
        const tabla = document.getElementById('tablaUsuarios');
        const mensajeCarga = document.getElementById('mensajeCarga');

        // Función para cargar usuarios desde Firestore
        async function cargarUsuarios() {
            cuerpoTabla.innerHTML = '';
            mensajeCarga.style.display = 'block';
            mensajeCarga.innerText = "Conectando con Firebase...";
            tabla.style.display = 'none';

            try {
                const querySnapshot = await getDocs(collection(db, "usuarios"));
                
                if (querySnapshot.empty) {
                    mensajeCarga.innerText = "No hay usuarios registrados en la colección 'usuarios'.";
                    return;
                }

                querySnapshot.forEach((usuarioDoc) => {
                    const data = usuarioDoc.data();
                    const id = usuarioDoc.id;

                    const fila = document.createElement('tr');
                    fila.innerHTML = `
                        <td>${data.nombre || 'Sin nombre'} ${data.apellido || ''}</td>
                        <td>${data.whatsapp || 'N/A'}</td>
                        <td>
                            <button class="btn-delete" data-id="${id}">Eliminar</button>
                        </td>
                    `;
                    cuerpoTabla.appendChild(fila);
                });

                mensajeCarga.style.display = 'none';
                tabla.style.display = 'table';

                // Configurar eventos para los botones de eliminar
                document.querySelectorAll('.btn-delete').forEach(boton => {
                    boton.addEventListener('click', async (e) => {
                        const userId = e.target.getAttribute('data-id');
                        if (confirm('¿Estás seguro de que deseas eliminar este usuario?')) {
                            await eliminarUsuario(userId);
                        }
                    });
                });

            } catch (error) {
                console.error("Error al obtener usuarios: ", error);
                mensajeCarga.innerText = "Error de conexión. Revisa la consola.";
            }
        }

        // Función para eliminar usuario
        async function eliminarUsuario(id) {
            try {
                await deleteDoc(doc(db, "usuarios", id));
                alert("Usuario eliminado correctamente.");
                cargarUsuarios(); // Recargar lista
            } catch (error) {
                alert("Error al eliminar: " + error.message);
            }
        }

        // Abrir y cerrar Modal
        btnVerUsuarios.onclick = () => {
            modalUsuarios.style.display = 'block';
            cargarUsuarios();
        };

        btnCerrarModal.onclick = () => {
            modalUsuarios.style.display = 'none';
        };

        window.onclick = (event) => {
            if (event.target == modalUsuarios) {
                modalUsuarios.style.display = 'none';
            }
        };
    </script>
</body>
</html>
