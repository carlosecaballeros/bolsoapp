<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Panel Admin - BolsoApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        h1 {
            font-size: 24px;
            color: #F5A623;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #F5A623;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .group-item {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .group-title {
            font-size: 18px;
            font-weight: bold;
            color: #F5A623;
            margin-bottom: 10px;
        }

        .payment-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }

        .btn-small {
            background: #4CAF50;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-small.danger {
            background: #E94560;
        }

        .btn-primary {
            background: linear-gradient(135deg, #F5A623, #E94560);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1100;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">← Volver</button>
            <h1>Admin Panel</h1>
            <div style="width: 60px;"></div>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div>💰 Ingresos</div>
                <div class="stat-number" id="totalIncome">0 Bs.</div>
            </div>
            <div class="stat-card">
                <div>👥 Usuarios</div>
                <div class="stat-number" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <div>📊 Grupos</div>
                <div class="stat-number" id="totalGroups">0</div>
            </div>
            <div class="stat-card">
                <div>⚠️ Morosos</div>
                <div class="stat-number" id="totalDefaulters">0</div>
            </div>
        </div>

        <div class="card">
            <h3>📋 Pagos Pendientes de Confirmar</h3>
            <div id="pendingPayments"></div>
        </div>

        <div class="card">
            <h3>📊 Grupos Activos</h3>
            <div id="activeGroups"></div>
        </div>

        <button class="btn-primary" onclick="refreshData()">🔄 Refrescar Datos</button>
    </div>

    <script>
        function loadAdminData() {
            // Verificar si es admin (simulado)
            const userData = localStorage.getItem('bolsoapp_user');
            if (!userData) {
                window.location.href = '../index.html';
                return;
            }

            // Datos simulados
            document.getElementById('totalIncome').textContent = '125.000 Bs.';
            document.getElementById('totalUsers').textContent = '15';
            document.getElementById('totalGroups').textContent = '3';
            document.getElementById('totalDefaulters').textContent = '2';

            // Pagos pendientes simulados
            const pendingHtml = `
                <div class="payment-row">
                    <div><strong>Ana Pérez</strong><br><small>Grupo Ahorro Vacaciones - Semana 3</small></div>
                    <div>31.000 Bs.<br><button class="btn-small" onclick="confirmPayment('Ana Pérez')">✅ Confirmar</button></div>
                </div>
                <div class="payment-row">
                    <div><strong>Luis García</strong><br><small>Grupo Fondo Emergencia - Semana 2</small></div>
                    <div>12.400 Bs.<br><button class="btn-small" onclick="confirmPayment('Luis García')">✅ Confirmar</button></div>
                </div>
            `;
            document.getElementById('pendingPayments').innerHTML = pendingHtml || '<div>No hay pagos pendientes</div>';

            // Grupos activos simulados
            const groupsHtml = `
                <div class="group-item">
                    <div class="group-title">Ahorro Vacaciones</div>
                    <div class="payment-row">
                        <span>👥 Participantes: 32/50</span>
                        <span>💰 Recaudado: 992.000 Bs.</span>
                    </div>
                    <div class="payment-row">
                        <span>📅 Semana actual: 3</span>
                        <button class="btn-small" onclick="transferPozo('Ahorro Vacaciones')">💸 Transferir pozo</button>
                    </div>
                </div>
                <div class="group-item">
                    <div class="group-title">Fondo Emergencia</div>
                    <div class="payment-row">
                        <span>👥 Participantes: 20/20</span>
                        <span>💰 Recaudado: 248.000 Bs.</span>
                    </div>
                    <div class="payment-row">
                        <span>📅 Semana actual: 5</span>
                        <button class="btn-small" onclick="transferPozo('Fondo Emergencia')">💸 Transferir pozo</button>
                    </div>
                </div>
            `;
            document.getElementById('activeGroups').innerHTML = groupsHtml;
        }

        function confirmPayment(userName) {
            showToast(`✅ Pago de ${userName} confirmado`, 'success');
        }

        function transferPozo(groupName) {
            showToast(`💸 Pozo de ${groupName} transferido al ganador`, 'success');
        }

        function refreshData() {
            showToast('🔄 Datos actualizados', 'success');
            loadAdminData();
        }

        function goBack() {
            window.location.href = 'dashboard.html';
        }

        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            if (type === 'success') toast.style.background = 'rgba(76, 175, 80, 0.9)';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        loadAdminData();
    </script>
</body>
</html>
