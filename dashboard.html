<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BolsoApp - Mi Cuenta</title>
    <style>
        :root { --blue: #2D5AFE; --bg: #F0F2F5; --text: #1C1E21; --success: #00A33C; --white: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); display: none; overflow-x: hidden; }
        
        .header { background: var(--blue); color: var(--white); padding: 50px 20px 70px; border-radius: 0 0 40px 40px; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 800; }
        
        .app-container { width: 100%; padding: 0 16px; margin-top: -45px; }
        
        .card-balance { background: var(--white); padding: 24px; border-radius: 24px; box-shadow: 0 10px 20px rgba(0,0,0,0.06); margin-bottom: 24px; text-align: center; }
        .label { color: #8E8E93; font-size: 13px; font-weight: 600; text-transform: uppercase; }
        .amount { font-size: 34px; font-weight: 800; color: var(--blue); margin-top: 8px; }

        .section-title { margin: 24px 8px 12px; font-size: 18px; font-weight: 700; }
        .list { display: flex; flex-direction: column; gap: 10px; }
        .item { background: var(--white); padding: 16px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; }
        .item-info b { display: block; font-size: 15px; }
        .item-info span { font-size: 12px; color: #8E8E93; }
        .item-value { font-weight: 700; color: var(--blue); }
        .plus { color: var(--success); }

        .btn-logout { background: #FFE5E5; color: #FF3B30; border: none; padding: 16px; width: calc(100% - 32px); border-radius: 18px; margin: 40px 16px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Hola, <span id="userName">...</span></h1>
        <p id="userCedula" style="opacity: 0.8; font-size: 14px;"></p>
    </div>

    <div class="app-container">
        <div class="card-balance">
            <div class="label">Saldo en Bolívares</div>
            <div class="amount" id="userBalance">Bs. 0,00</div>
        </div>

        <div class="section-title">Mis Bolsos</div>
        <div class="list" id="groupsList"></div>

        <div class="section-title">Actividad Reciente</div>
        <div class="list" id="movesList"></div>
    </div>

    <button class="btn-logout" onclick="salir()">Cerrar Sesión</button>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Formateador de moneda para Bolívares
        const formatoBs = (monto) => {
            return "Bs. " + Number(monto).toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.body.style.display = "block";
                
                // 1. Perfil
                const uSnap = await getDoc(doc(db, "usuarios", user.uid));
                if (uSnap.exists()) {
                    document.getElementById('userName').innerText = uSnap.data().name.split(' ')[0];
                    document.getElementById('userCedula').innerText = "V-" + (uSnap.data().cedula || "");
                }

                // 2. Saldo y Movimientos
                const qMov = query(collection(db, "movimientos"), where("usuarioId", "==", user.uid), orderBy("saldoPosterior", "desc"));
                onSnapshot(qMov, (snap) => {
                    const movesCont = document.getElementById('movesList');
                    if (!snap.empty) {
                        document.getElementById('userBalance').innerText = formatoBs(snap.docs[0].data().saldoPosterior);
                        movesCont.innerHTML = "";
                        snap.forEach(d => {
                            movesCont.innerHTML += `
                                <div class="item">
                                    <div class="item-info"><b>Abono</b><span>Ref: ${d.id.substring(0,6)}</span></div>
                                    <div class="item-value plus">+${formatoBs(d.data().saldoPosterior)}</div>
                                </div>`;
                        });
                    }
                });

                // 3. Grupos
                const qPart = query(collection(db, "participantes_grupo"), where("usuarioId", "==", user.uid));
                onSnapshot(qPart, (snap) => {
                    const groupCont = document.getElementById('groupsList');
                    groupCont.innerHTML = "";
                    snap.forEach(async (docP) => {
                        const gSnap = await getDoc(doc(db, "grupos", docP.data().grupoId));
                        if (gSnap.exists()) {
                            const g = gSnap.data();
                            groupCont.innerHTML += `
                                <div class="item">
                                    <div class="item-info"><b>${g.nombre}</b><span>Semana ${g.semanaActual}</span></div>
                                    <div class="item-value">${formatoBs(g.monto)}</div>
                                </div>`;
                        }
                    });
                });
            } else { window.location.href = "login.html"; }
        });

        window.salir = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>
