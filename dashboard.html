<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BolsoApp - Inicio</title>
    <style>
        :root { --blue: #2D5AFE; --bg: #F0F2F5; --text: #1C1E21; --white: #ffffff; --gray: #8E8E93; --success: #00A33C; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; }
        .header { background: var(--blue); color: white; padding: 50px 20px 60px; border-radius: 0 0 35px 35px; }
        .container { padding: 0 16px; margin-top: -30px; }
        .card { background: white; padding: 20px; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .progress-bar { background: #eee; height: 10px; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .progress-fill { background: var(--success); height: 100%; width: 0%; transition: 0.5s; }
        
        /* NAV BAR */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; height: 75px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { text-decoration: none; color: var(--gray); font-size: 10px; display: flex; flex-direction: column; align-items: center; width: 20%; }
        .nav-item.active { color: var(--blue); }
        .nav-item-center { background: var(--blue); color: white !important; width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; margin-top: -40px; border: 6px solid var(--bg); }
    </style>
</head>
<body>
    <div class="header">
        <h1>Hola, <span id="userName">...</span></h1>
        <p>Estado de tu Bolso actual</p>
    </div>
    <div class="container">
        <div id="groupStatus" class="card">
            <h3 style="margin:0">Cargando grupo...</h3>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active"><span>🏠</span><span>Inicio</span></a>
        <a href="grupos.html" class="nav-item"><span>👥</span><span>Grupos</span></a>
        <a href="nuevo-bolso.html" class="nav-item nav-item-center">+</a>
        <a href="historial.html" class="nav-item"><span>🕒</span><span>Historial</span></a>
        <a href="perfil.html" class="nav-item"><span>👤</span><span>Perfil</span></a>
    </nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const uSnap = await getDoc(doc(db, "usuarios", user.uid));
                if (uSnap.exists()) document.getElementById('userName').innerText = uSnap.data().name.split(' ')[0];
            } else { window.location.href = "login.html"; }
        });
    </script>
</body>
</html>
