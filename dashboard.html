<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BolsoApp - Estado del Grupo</title>
    <link rel="stylesheet" href="app.css">
    <style>
        .header { 
            background: var(--blue); 
            color: var(--white); 
            padding: 40px 20px 20px; 
            border-radius: 0 0 30px 30px; 
        }
        .group-status-card {
            background: var(--white);
            margin-top: -30px;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .progress-container {
            background: #eee;
            border-radius: 10px;
            height: 12px;
            margin: 15px 0;
            overflow: hidden;
        }
        .progress-bar {
            background: var(--success);
            height: 100%;
            width: 0%; /* Se actualiza con JS */
            transition: width 0.5s;
        }
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-paid { background: #e6f7ed; color: #00A33C; }
        .badge-pending { background: #fff4e5; color: #FF9500; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Hola, <span id="userName">...</span></h1>
        <p>Estado de tus grupos de ahorro</p>
    </div>

    <div class="mobile-container">
        <div id="activeGroupsContainer">
            </div>

        <div class="section-title">Lista de Pagos del Ciclo</div>
        <div class="list" id="paymentsList">
            <p style="text-align: center; color: var(--gray);">Cargando historial de pagos...</p>
        </div>
    </div>

    <button class="btn-primary" style="margin: 20px 16px; width: calc(100% - 32px);" onclick="window.location.href='pagos.html'">
        Registrar mi pago de hoy
    </button>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.body.style.display = "block";
                
                // 1. Obtener nombre del usuario
                const uSnap = await getDoc(doc(db, "usuarios", user.uid));
                if (uSnap.exists()) document.getElementById('userName').innerText = uSnap.data().name.split(' ')[0];

                // 2. Escuchar los grupos donde participa
                const qPart = query(collection(db, "participantes_grupo"), where("usuarioId", "==", user.uid));
                onSnapshot(qPart, (snapPart) => {
                    const container = document.getElementById('activeGroupsContainer');
                    container.innerHTML = "";
                    
                    snapPart.forEach(async (docPart) => {
                        const gId = docPart.data().grupoId;
                        const gSnap = await getDoc(doc(db, "grupos", gId));
                        
                        if (gSnap.exists()) {
                            const g = gSnap.data();
                            // Cálculo de progreso (esto asume que tienes un campo de cuántos han pagado)
                            const porcentaje = (g.pagosRecibidos / g.participantesMax) * 100;
                            
                            container.innerHTML += `
                                <div class="group-status-card">
                                    <div style="display:flex; justify-content:space-between; align-items:center;">
                                        <b style="font-size:18px;">${g.nombre}</b>
                                        <span class="badge ${porcentaje === 100 ? 'badge-paid' : 'badge-pending'}">
                                            ${porcentaje === 100 ? 'Listo para entrega' : 'En recolecta'}
                                        </span>
                                    </div>
                                    <p style="font-size:13px; color:var(--gray); margin: 5px 0;">Monto total a entregar: <b>Bs. ${g.monto.toLocaleString('es-VE')}</b></p>
                                    
                                    <div class="progress-container">
                                        <div class="progress-bar" style="width: ${porcentaje}%"></div>
                                    </div>
                                    <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:600;">
                                        <span>${g.pagosRecibidos} de ${g.participantesMax} pagos</span>
                                        <span>${Math.round(porcentaje)}%</span>
                                    </div>
                                </div>
                            `;
                        }
                    });
                });

                // 3. Lista de quién ha pagado (Colección movimientos/pagos)
                const qPagos = query(collection(db, "movimientos"), orderBy("fecha", "desc"));
                onSnapshot(qPagos, (snap) => {
                    const list = document.getElementById('paymentsList');
                    list.innerHTML = "";
                    snap.forEach(d => {
                        const p = d.data();
                        list.innerHTML += `
                            <div class="item">
                                <div class="item-info">
                                    <b>${p.usuarioNombre || 'Socio'}</b>
                                    <span>${p.fecha.toDate().toLocaleDateString()}</span>
                                </div>
                                <div class="badge badge-paid">PAGADO</div>
                            </div>
                        `;
                    });
                });

            } else { window.location.href = "login.html"; }
        });
    </script>
</body>
</html>
