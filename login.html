<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entrar - BolsoApp</title>
    <style>
        :root { --blue: #2D5AFE; --bg: #F0F2F5; --text: #1C1E21; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 28px; width: 90%; max-width: 360px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        img { width: 100px; margin-bottom: 20px; }
        input { width: 100%; padding: 16px; margin: 8px 0; border: 1px solid #E4E6EB; border-radius: 14px; font-size: 16px; background: #F7F8FA; }
        button { width: 100%; padding: 16px; background: var(--blue); color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; margin-top: 15px; cursor: pointer; }
        a { color: var(--blue); text-decoration: none; font-size: 14px; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="BolsoApp.png" alt="Logo">
        <h2 style="margin-bottom: 20px;">BolsoApp</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Correo electrónico" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit">Iniciar Sesión</button>
        </form>
        <a href="register.html">¿No tienes cuenta? Regístrate</a>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await setPersistence(auth, browserLocalPersistence);
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                window.location.href = "dashboard.html";
            } catch (error) { alert("Error: " + error.message); }
        });
    </script>
</body>
</html>
