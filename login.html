<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BolsoApp - Login</title>
    <link rel="stylesheet" href="stiles.css">
</head>
<body>
    <div class="registro-container" style="max-width: 400px; margin: 50px auto; padding: 20px; text-align: center;">
        <img src="assets/BolsoApp.png" alt="Logo" style="width: 100px; margin-bottom: 20px;">
        <h2>Iniciar Sesión</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Correo electrónico" required style="width: 100%; padding: 10px; margin: 10px 0;">
            <input type="password" id="password" placeholder="Contraseña" required style="width: 100%; padding: 10px; margin: 10px 0;">
            <button type="submit" id="btnLogin" class="btn-primary" style="width: 100%; padding: 12px; background: #2D5AFE; color: white; border: none; border-radius: 8px; cursor: pointer;">Entrar</button>
            <button type="button" onclick="window.location.href='index.html'" class="btn-secondary" style="width: 100%; margin-top: 10px; padding: 10px; background: transparent; border: 1px solid #ccc; border-radius: 8px;">Volver</button>
        </form>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Guardamos la sesión para que no se cierre al cambiar de carpeta
                await setPersistence(auth, browserLocalPersistence);
                await signInWithEmailAndPassword(auth, email, password);
                
                // IMPORTANTE: Te manda a la subcarpeta
                window.location.href = "pague/dashboard.html"; 
            } catch (error) {
                alert("Error al entrar: " + error.message);
            }
        });
    </script>
</body>
</html>
