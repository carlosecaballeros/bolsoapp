<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BolsoApp - Dashboard</title>
    <link rel="stylesheet" href="../stiles.css"> </head>
<body>
    <div class="container">
        <h1>Hola, <span id="userName">Cargando...</span> 👋</h1>
        <div id="statusAccount">Verificando sesión...</div>
    </div>

    <script type="module">
        // Importación directa desde la misma carpeta
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                console.log("✅ Usuario detectado:", user.email);
                document.getElementById('statusAccount').innerText = "Sesión activa";

                // Intento de cargar datos de Firestore
                try {
                    if (db) {
                        const userRef = doc(db, "usuarios", user.uid);
                        const docSnap = await getDoc(userRef);

                        if (docSnap.exists()) {
                            document.getElementById('userName').innerText = docSnap.data().nombre;
                        } else {
                            // Si no hay documento, usamos el nombre del correo
                            document.getElementById('userName').innerText = user.email.split('@')[0];
                        }
                    } else {
                        throw new Error("Variable 'db' no definida");
                    }
                } catch (error) {
                    console.error("Error al obtener datos:", error);
                    // Fallback amigable: mostrar el nombre desde el correo
                    document.getElementById('userName').innerText = user.email.split('@')[0];
                }

            } else {
                console.log("❌ Sin sesión. Redirigiendo...");
                // Esperamos un poco antes de redirigir para evitar errores de carga lenta
                setTimeout(() => {
                    if (!auth.currentUser) {
                        window.location.href = "../index.html";
                    }
                }, 3000);
            }
        });
    </script>
</body>
</html>
