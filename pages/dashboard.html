<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Inicio - BolsoApp</title>
    <style>
        :root { --primary: #2D5AFE; --bg: #F8FAFC; --card: #FFFFFF; --text-main: #1E293B; --text-muted: #64748B; --border: #E2E8F0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); padding-bottom: 110px; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        .balance-card { background: var(--primary); color: white; padding: 25px; border-radius: 24px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(45, 90, 254, 0.2); }
        .balance-label { font-size: 14px; opacity: 0.8; }
        .balance-amount { font-size: 32px; font-weight: 800; margin: 5px 0; }

        .activity-card { background: white; padding: 15px; border-radius: 18px; margin-top: 10px; border: 1px solid var(--border); }
        
        /* Barra de navegación inferior */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0 25px; border-top: 1px solid var(--border); z-index: 1000; }
        .tab-item { text-align: center; text-decoration: none; color: var(--text-muted); font-size: 11px; font-weight: 600; width: 20%; }
        .tab-item.active { color: var(--primary); }
        .tab-icon { font-size: 20px; display: block; margin-bottom: 4px; }
        
        /* Pantalla de carga inicial */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

    <div id="loader">
        <div style="text-align: center;">
            <p style="font-weight: bold; color: var(--primary);">Cargando BolsoApp...</p>
        </div>
    </div>

    <div class="container">
        <header style="margin-bottom: 25px;">
            <h1>Hola, <span id="userName">...</span> 👋</h1>
            <p style="color: var(--text-muted);">Este es el estado de tu ahorro.</p>
        </header>

        <div class="balance-card">
            <p class="balance-label">Total en mis Bolsos</p>
            <p class="balance-amount" id="totalAhorro">$0.00</p>
            <p style="font-size: 12px;">Estado: Cuenta Activa</p>
        </div>

        <h3>Actividad reciente</h3>
        <div class="activity-card">
            <p id="statusMsg" style="font-size: 14px; color: var(--text-muted);">Verificando transacciones...</p>
        </div>
    </div>

    <nav class="tab-bar">
        <a href="dashboard.html" class="tab-item active"><span class="tab-icon">🏠</span>Inicio</a>
        <a href="groups.html" class="tab-item"><span class="tab-icon">➕</span>Unirse</a>
        <a href="payments.html" class="tab-item"><span class="tab-icon">💳</span>Pagos</a>
        <a href="my-group.html" class="tab-item"><span class="tab-icon">👥</span>Grupo</a>
        <a href="profile.html" class="tab-item"><span class="tab-icon">⚙️</span>Perfil</a>
    </nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const loader = document.getElementById('loader');
        const userNameSpan = document.getElementById('userName');

        // Escuchador de estado de autenticación
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                console.log("✅ Usuario autenticado:", user.email);
                
                try {
                    // Obtener datos del perfil desde Firestore
                    const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                    
                    if (userDoc.exists()) {
                        userNameSpan.innerText = userDoc.data().nombre || "Usuario";
                        document.getElementById('statusMsg').innerText = "Bienvenido de nuevo.";
                    } else {
                        userNameSpan.innerText = "Usuario";
                        console.warn("No se encontró el documento del usuario en Firestore.");
                    }
                } catch (error) {
                    console.error("Error al obtener datos:", error);
                } finally {
                    // Ocultar loader una vez cargado todo
                    loader.style.display = "none";
                }
            } else {
                console.warn("⚠️ No hay sesión activa. Redirigiendo...");
                // Pequeña espera para evitar rebotes falsos por lentitud de red
                setTimeout(() => {
                    if (!auth.currentUser) {
                        window.location.href = "index.html";
                    }
                }, 2000);
            }
        });
    </script>
</body>
</html>
