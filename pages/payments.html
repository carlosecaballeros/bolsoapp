<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mis Pagos - BolsoApp</title>
    <style>
        :root { --primary: #2D5AFE; --secondary: #00D084; --bg: #F8FAFC; --card: #FFFFFF; --text-main: #1E293B; --text-muted: #64748B; --border: #E2E8F0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); padding-bottom: 110px; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }

        /* Estilos de Pagos */
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .pending { background: #FEF3C7; color: #92400E; }
        .paid { background: #DCFCE7; color: #166534; }
        
        .payment-item { background: var(--card); padding: 18px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .pay-button { background: var(--primary); color: white; border: none; padding: 10px 18px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        /* Barra Inferior */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0 25px; border-top: 1px solid var(--border); z-index: 1000; }
        .tab-item { position: relative; text-align: center; text-decoration: none; color: var(--text-muted); font-size: 10px; font-weight: 600; width: 20%; z-index: 2; }
        .tab-item.active { color: var(--primary); }
        .tab-icon { font-size: 20px; display: block; margin-bottom: 4px; }
        .tab-indicator { position: absolute; top: 8px; left: 0; height: 48px; width: 20%; background: rgba(45, 90, 254, 0.1); border-radius: 14px; z-index: 1; transition: 0.3s; }
        .pos-2 { transform: translateX(200%); }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="margin-bottom: 20px;">Próximos Pagos</h2>

        <div class="payment-item">
            <div>
                <p style="font-weight: 700;">Cuota #4 - Bolso Viaje</p>
                <p style="font-size: 13px; color: var(--text-muted);">Vence hoy, 17 de Abril</p>
                <span class="status-badge pending">Pendiente $50.00</span>
            </div>
            <button class="pay-button">Pagar</button>
        </div>

        <h3 style="margin: 25px 0 15px;">Historial</h3>
        
        <div class="payment-item" style="opacity: 0.8;">
            <div>
                <p style="font-weight: 700;">Cuota #3 - Bolso Viaje</p>
                <p style="font-size: 13px; color: var(--text-muted);">Pagado el 10 de Abril</p>
            </div>
            <span class="status-badge paid">Completado</span>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-indicator pos-2"></div>
        <a href="dashboard.html" class="tab-item"><span class="tab-icon">🏠</span>Inicio</a>
        <a href="groups.html" class="tab-item"><span class="tab-icon">➕</span>Unirse</a>
        <a href="payments.html" class="tab-item active"><span class="tab-icon">💳</span>Pagos</a>
        <a href="my-group.html" class="tab-item"><span class="tab-icon">👥</span>Grupo</a>
        <a href="profile.html" class="tab-item"><span class="tab-icon">⚙️</span>Perfil</a>
    </nav>
</body>
</html>
