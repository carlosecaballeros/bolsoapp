<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BolsoApp - Registro</title>
    <link rel="stylesheet" href="stiles.css">
</head>
<body>
    <div class="registro-container">
        <h2>Crear cuenta</h2>
        <form id="registroForm">
            <input type="text" id="nombre" placeholder="Nombre" required>
            <input type="text" id="apellido" placeholder="Apellido" required>
            <input type="text" id="whatsapp" placeholder="WhatsApp" required>
            <input type="text" id="cedula" placeholder="Cédula/ID" required>
            <input type="text" id="direccion" placeholder="Dirección" required>

            <div style="text-align: left;">
                <input type="email" id="emailInput" placeholder="Correo electrónico" required style="width: 100%; margin-bottom: 0;">
                <div id="emailFeedback" style="font-size: 0.85em; margin-top: 5px; font-weight: bold; min-height: 1.2em;"></div>
            </div>

            <input type="password" id="pass1" placeholder="Contraseña" required>
            <input type="password" id="pass2" placeholder="Confirmar contraseña" required>

            <button type="submit" id="btnCrearCuenta" class="btn-primary">Registrarme</button>
            <button type="button" onclick="window.location.href='index.html'" class="btn-secondary">Volver al inicio</button>
        </form>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { createUserWithEmailAndPassword, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const emailInput = document.getElementById('emailInput');
        const emailFeedback = document.getElementById('emailFeedback');
        const btnCrearCuenta = document.getElementById('btnCrearCuenta');

        // Validación de colores (Rojo/Verde)
        emailInput.addEventListener('input', async () => {
            const email = emailInput.value.trim();
            if (email.length < 5) return;

            try {
                const methods = await fetchSignInMethodsForEmail(auth, email);
                if (methods.length > 0) {
                    emailFeedback.innerText = "❌ Este correo ya está registrado.";
                    emailFeedback.style.color = "red";
                    emailInput.style.borderColor = "red";
                    btnCrearCuenta.disabled = true;
                } else {
                    emailFeedback.innerText = "✅ Correo disponible.";
                    emailFeedback.style.color = "green";
                    emailInput.style.borderColor = "green";
                    btnCrearCuenta.disabled = false;
                }
            } catch (e) {}
        });

        // Lógica de registro
        document.getElementById('registroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value;
            const pass1 = document.getElementById('pass1').value;
            if (pass1 !== document.getElementById('pass2').value) return alert("Las contraseñas no coinciden");

            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass1);
                await setDoc(doc(db, "usuarios", res.user.uid), {
                    nombre: document.getElementById('nombre').value,
                    email: email,
                    fecha: new Date().toISOString()
                });
                alert("¡Éxito!");
                window.location.href = "admin-panel.html";
            } catch (err) { alert("Error: " + err.message); }
        });
    </script>
</body>
</html>
