<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mi Grupo - BolsoApp</title>
    <style>
        :root { --primary: #2D5AFE; --bg: #F8FAFC; --card: #FFFFFF; --text-main: #1E293B; --text-muted: #64748B; --border: #E2E8F0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); padding-bottom: 110px; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }

        /* Estilos de Mi Grupo */
        .group-header { background: white; padding: 20px; border-radius: 24px; border: 1px solid var(--border); text-align: center; margin-bottom: 20px; }
        .member-list { background: white; border-radius: 24px; border: 1px solid var(--border); overflow: hidden; }
        .member-item { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--border); }
        .member-item:last-child { border-bottom: none; }
        .member-avatar { width: 35px; height: 35px; border-radius: 50%; background: #E2E8F0; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
        .winner-tag { margin-left: auto; color: #00D084; font-size: 12px; font-weight: 700; }

        /* Barra Inferior */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0 25px; border-top: 1px solid var(--border); z-index: 1000; }
        .tab-item { position: relative; text-align: center; text-decoration: none; color: var(--text-muted); font-size: 10px; font-weight: 600; width: 20%; z-index: 2; }
        .tab-item.active { color: var(--primary); }
        .tab-icon { font-size: 20px; display: block; margin-bottom: 4px; }
        .tab-indicator { position: absolute; top: 8px; left: 0; height: 48px; width: 20%; background: rgba(45, 90, 254, 0.1); border-radius: 14px; z-index: 1; transition: 0.3s; }
        .pos-3 { transform: translateX(300%); }
    </style>
</head>
<body>
    <div class="container">
        <div class="group-header">
            <span style="font-size: 40px;">🏘️</span>
            <h2 style="margin-top: 10px;">Bolso Vecinos</h2>
            <p style="color: var(--text-muted); font-size: 14px;">Monto total: $500.00</p>
        </div>

        <h3 style="margin-bottom: 15px;">Participantes (10)</h3>
        <div class="member-list">
            <div class="member-item">
                <div class="member-avatar" style="background: #DCE7FF; color: #2D5AFE;">JD</div>
                <p style="font-size: 14px; font-weight: 600;">Juan Delgado (Tú)</p>
                <span class="winner-tag">Semana 8</span>
            </div>
            <div class="member-item">
                <div class="member-avatar">ML</div>
                <p style="font-size: 14px; font-weight: 600;">Maria Lopez</p>
                <span class="winner-tag" style="color: #2D5AFE;">★ Ganador Actual</span>
            </div>
            <div class="member-item">
                <div class="member-avatar">RP</div>
                <p style="font-size: 14px; font-weight: 600;">Ricardo Pérez</p>
                <span class="winner-tag">Semana 3</span>
            </div>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-indicator pos-3"></div>
        <a href="dashboard.html" class="tab-item"><span class="tab-icon">🏠</span>Inicio</a>
        <a href="groups.html" class="tab-item"><span class="tab-icon">➕</span>Unirse</a>
        <a href="payments.html" class="tab-item"><span class="tab-icon">💳</span>Pagos</a>
        <a href="my-group.html" class="tab-item active"><span class="tab-icon">👥</span>Grupo</a>
        <a href="profile.html" class="tab-item"><span class="tab-icon">⚙️</span>Perfil</a>
    </nav>
</body>
</html>
