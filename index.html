<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BolsoApp - Registro</title>
    <link rel="stylesheet" href="stiles.css">
    <style>
        /* Estilos adicionales para los mensajes de validación */
        .feedback-mensaje {
            font-size: 0.85em;
            margin-top: 5px;
            font-weight: bold;
            min-height: 1.2em;
            transition: all 0.3s ease;
        }
        input {
            transition: border-color 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="registro-container">
        <h2>Crear cuenta</h2>
        <p>Regístrate para empezar a usar BolsoApp</p>
        
        <form id="registroForm">
            <input type="text" id="nombre" placeholder="Nombre" required>
            <input type="text" id="apellido" placeholder="Apellido" required>
            <input type="text" id="whatsapp" placeholder="Número de WhatsApp" required>
            <input type="text" id="cedula" placeholder="Cédula o ID" required>
            <input type="text" id="direccion" placeholder="Dirección de habitación" required>

            <div style="margin-bottom: 15px; text-align: left;">
                <input type="email" id="emailInput" placeholder="Correo electrónico" required style="width: 100%; margin-bottom: 0;">
                <div id="emailFeedback" class="feedback-mensaje"></div>
            </div>

            <input type="password" id="pass1" placeholder="Contraseña" required>
            <input type="password" id="pass2" placeholder="Confirmar contraseña" required>

            <button type="submit" id="btnCrearCuenta" class="btn-primary">Crear cuenta</button>
            <button type="button" onclick="window.location.href='login.html'" class="btn-secondary">Volver</button>
        </form>
    </div>

    <script type="module">
        // Importamos la configuración y las librerías necesarias
        import { auth, db } from './firebase-config.js';
        import { 
            createUserWithEmailAndPassword, 
            fetchSignInMethodsForEmail 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const emailInput = document.getElementById('emailInput');
        const emailFeedback = document.getElementById('emailFeedback');
        const btnCrearCuenta = document.getElementById('btnCrearCuenta');
        const registroForm = document.getElementById('registroForm');

        // --- 1. VALIDACIÓN DE CORREO EN TIEMPO REAL (ROJO/VERDE) ---
        emailInput.addEventListener('input', async () => {
            const email = emailInput.value.trim();
            
            if (email.length < 5) {
                emailFeedback.innerText = "";
                emailInput.style.borderColor = "";
                return;
            }

            try {
                // Consultamos si el correo existe en la base de datos de Auth
                const methods = await fetchSignInMethodsForEmail(auth, email);

                if (methods.length > 0) {
                    // SI EXISTE: Rojo
                    emailFeedback.innerText = "❌ Este correo ya está registrado.";
                    emailFeedback.style.color = "#ff4d4d";
                    emailInput.style.borderColor = "#ff4d4d";
                    btnCrearCuenta.disabled = true;
                    btnCrearCuenta.style.opacity = "0.5";
                } else {
                    // NO EXISTE: Verde
                    emailFeedback.innerText = "✅ Correo disponible para registro.";
                    emailFeedback.style.color = "#2ecc71";
                    emailInput.style.borderColor = "#2ecc71";
                    btnCrearCuenta.disabled = false;
                    btnCrearCuenta.style.opacity = "1";
                }
            } catch (error) {
                // Error si el formato aún no es de correo (ej: "usuario@")
                if (error.code === 'auth/invalid-email') {
                    emailFeedback.innerText = "Escribiendo correo...";
                    emailFeedback.style.color = "#f39c12";
                }
            }
        });

        // --- 2. PROCESO DE REGISTRO AL HACER SUBMIT ---
        registroForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value;
            const pass1 = document.getElementById('pass1').value;
            const pass2 = document.getElementById('pass2').value;

            // Validación básica de contraseñas
            if (pass1 !== pass2) {
                alert("Las contraseñas no coinciden. Por favor, verifica.");
                return;
            }

            if (pass1.length < 6) {
                alert("La contraseña debe tener al menos 6 caracteres.");
                return;
            }

            try {
                // Paso A: Crear el usuario en Firebase Authentication
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass1);
                const user = userCredential.user;

                // Paso B: Guardar los datos extras en Firestore
                await setDoc(doc(db, "usuarios", user.uid), {
                    nombre: document.getElementById('nombre').value,
                    apellido: document.getElementById('apellido').value,
                    whatsapp: document.getElementById('whatsapp').value,
                    cedula: document.getElementById('cedula').value,
                    direccion: document.getElementById('direccion').value,
                    email: email,
                    rol: "usuario",
                    fechaRegistro: new Date().toISOString()
                });

                alert("¡Bienvenido a BolsoApp! Cuenta creada con éxito.");
                window.location.href = "admin-panel.html";

            } catch (error) {
                console.error("Error detallado:", error);
                if (error.code === 'auth/email-already-in-use') {
                    alert("Este correo ya fue registrado.");
                } else {
                    alert("Error al registrar: " + error.message);
                }
            }
        });
    </script>
</body>
</html>
